<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ferramentas de Escritório</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Minhas Ferramentas de Escritório</h1>
    </header>

    <main>
      <div class="tool-card">
        <div class="tool-header">
          <h2>Limpador de Números - Autorização - Consulta</h2>
        </div>
        <div class="tool-body">
          <label for="inputNumero">Insira o número com espaços/traços:</label>
          <textarea
            id="inputNumero"
            rows="4"
            placeholder="EX. CONSULTA -  (11) 9 9999-1234 | AUTORIZAÇÃO - CONTA: 11 9 9999-1234"
          ></textarea>

          <button id="btnLimpar">Limpar Número para autorização</button>
          <button id="btnLimparAut">Limpar número para consulta</button>

          <label for="outputNumero">Resultado:</label>
          <textarea
            id="outputNumero"
            rows="4"
            placeholder="O resultado aparecerá aqui..."
          ></textarea>
        </div>
      </div>
      <!-- funcao para   -->
      <div class="tool-card">
        <div class="tool-header">
          <h2>Números Administrativos - Bancos</h2>
        </div>
        <!-- adicionar uma função para adicionar os números com inputs e salvá-los via localhost -->

        <div class="social-banks-numbers">
          <input
            type="text"
            name="addBankName"
            id="addBankName"
            placeholder="Nome do banco"
          />
          <input
            type="text"
            name="addBankNumber"
            id="addBankNumber"
            placeholder="Número do banco"
          />
          <button id="btnAddBank">Adicionar</button>
          <div id="bankList">
            <!-- Lista de bancos será renderizada aqui -->
        </div>
      </div>
    </main>
    <script>
      <!-- adicionar uma função para adicionar os números com inputs e salvá-los via localStorage e carregar os dados do localStorage-->

      document.addEventListener("DOMContentLoaded", function () {
        const bankList = document.getElementById("bankList");
        const addBankName = document.getElementById("addBankName");
        const addBankNumber = document.getElementById("addBankNumber");
        const btnAddBank = document.getElementById("btnAddBank");

        // Função para carregar os bancos do localStorage
        function loadBanks() {
          const banks = JSON.parse(localStorage.getItem("banks")) || [];
          bankList.innerHTML = "";
          banks.forEach((bank, index) => {
            const bankItem = document.createElement("div");
            bankItem.className = "bank-item";
            bankItem.innerHTML = `
              <h3>${bank.name}</h3>
              <span><strong>Número</strong>: ${bank.number}</span><button data-index="${index}" class="delete-bank">Excluir</button>
            `;
            bankList.appendChild(bankItem);
          });
        }

        // Função para adicionar um banco
        btnAddBank.addEventListener("click", function () {
          const name = addBankName.value.trim();
          const number = addBankNumber.value.trim();
          if (name && number) {
            const banks = JSON.parse(localStorage.getItem("banks")) || [];
            banks.push({ name, number });
            localStorage.setItem("banks", JSON.stringify(banks));
            addBankName.value = "";
            addBankNumber.value = "";
            loadBanks();
          }
        });

        // Função para excluir um banco
        bankList.addEventListener("click", function (e) {
          if (e.target.classList.contains("delete-bank")) {
            const index = e.target.getAttribute("data-index");
            const banks = JSON.parse(localStorage.getItem("banks")) || [];
            banks.splice(index, 1);
            localStorage.setItem("banks", JSON.stringify(banks));
            loadBanks();
          }
        });

        // Carregar os bancos ao iniciar
        loadBanks();
      });

      //mudar estilo do botão excluir
      document.addEventListener("DOMContentLoaded", function () {
        const style = document.createElement("style");
        style.innerHTML = `
          .delete-bank {
            background-color: #ff4d4d;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 3px;
          }
          .delete-bank:hover {
            background-color: #ff1a1a;
          }
        `;
        document.head.appendChild(style);
      });
    </script>

    <script src="script.js"></script>
  </body>
</html>
